name: Build Electron Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: electron-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare optional macOS signing
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            {
              echo "CSC_LINK<<__MACOS_CERT__"
              echo "$MACOS_CERTIFICATE"
              echo "__MACOS_CERT__"
            } >> "$GITHUB_ENV"

            {
              echo "CSC_KEY_PASSWORD<<__MACOS_CERT_PASSWORD__"
              echo "$MACOS_CERTIFICATE_PASSWORD"
              echo "__MACOS_CERT_PASSWORD__"
            } >> "$GITHUB_ENV"
          fi

          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            mkdir -p "$RUNNER_TEMP/notary"
            key_path="$RUNNER_TEMP/notary/AuthKey_${APPLE_API_KEY_ID}.p8"

            if [[ "$APPLE_API_KEY" == *"BEGIN PRIVATE KEY"* ]]; then
              printf "%s" "$APPLE_API_KEY" > "$key_path"
            elif printf "%s" "$APPLE_API_KEY" | base64 --decode > "$key_path" 2>/dev/null && grep -q "BEGIN PRIVATE KEY" "$key_path"; then
              true
            else
              rm -f "$key_path"
              key_path="$APPLE_API_KEY"
            fi

            echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          fi

      - name: Build macOS x64 and arm64
        run: |
          npm run build:electron
          npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hillstate-macos-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable app
        run: |
          npm run build:electron
          npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hillstate-windows-exe
          path: release/*.exe
          if-no-files-found: error
          retention-days: 14
